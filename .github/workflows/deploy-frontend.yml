name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - '拼代代前端文件/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend service to Railway production
        working-directory: 拼代代前端文件
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          railway up . \
            --path-as-root \
            --no-gitignore \
            --ci \
            --project f372a67e-5f11-4c8a-85fd-cd4196eba420 \
            --environment 721bba45-818c-42ee-822c-8ee3cd8bef17 \
            --service 11e4d547-6ebd-4cb7-8de2-7238e761fae7 \
            --message "GitHub Actions deploy frontend ${GITHUB_SHA}"
